<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY클라우드 — 권서진</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: rgba(0,0,0,0.08);
  --border2: rgba(0,0,0,0.14);
  --text: #1a1a1a;
  --text2: #666;
  --text3: #999;
  --blue: #3B82F6;
  --blue-bg: #EFF6FF;
  --blue-text: #1D4ED8;
  --red: #EF4444;
  --red-bg: #FEF2F2;
  --red-text: #B91C1C;
  --amber-bg: #FFFBEB;
  --amber-text: #92400E;
  --gray-bg: #F9FAFB;
  --gray-text: #6B7280;
  --folder: #FBBF24;
  --radius: 8px;
  --radius-lg: 12px;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.os-bar {
  background: var(--surface);
  border-bottom: 0.5px solid var(--border2);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  font-size: 12px;
  color: var(--text3);
  position: sticky;
  top: 0;
  z-index: 100;
}
.os-logo {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
}
.os-logo-icon {
  width: 22px;
  height: 22px;
  background: linear-gradient(135deg, #60A5FA, #3B82F6);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.os-logo-icon svg { width: 13px; height: 13px; fill: white; }
.os-sep { color: var(--border2); }
.os-path { color: var(--text2); }
.os-path span { color: var(--text); font-weight: 500; }
.os-spacer { flex: 1; }
.os-user {
  background: var(--surface2);
  border-radius: 20px;
  padding: 3px 10px 3px 6px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  color: var(--text2);
}
.os-avatar {
  width: 18px; height: 18px;
  background: #DBEAFE;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; font-weight: 500; color: #1D4ED8;
}

.main {
  flex: 1;
  max-width: 780px;
  margin: 0 auto;
  width: 100%;
  padding: 24px 20px 60px;
}

.toolbar {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 16px;
}
.toolbar-btn {
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  color: var(--text2);
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius);
  padding: 5px 12px;
  cursor: default;
}
.tb-spacer { flex: 1; }
.file-count { font-size: 12px; color: var(--text3); }

.file-list {
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-lg);
  overflow: hidden;
}

.list-header {
  display: grid;
  grid-template-columns: 1fr 90px 70px;
  padding: 7px 16px;
  font-size: 11px;
  color: var(--text3);
  background: var(--surface2);
  border-bottom: 0.5px solid var(--border);
  letter-spacing: 0.03em;
}

.section-divider {
  font-size: 10px;
  color: var(--text3);
  padding: 5px 16px 4px;
  background: var(--surface2);
  border-bottom: 0.5px solid var(--border);
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.file-row {
  display: grid;
  grid-template-columns: 1fr 90px 70px;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 0.5px solid var(--border);
  cursor: pointer;
  transition: background 0.12s;
  user-select: none;
}
.file-row:last-child { border-bottom: none; }
.file-row:hover { background: #fafaf7; }
.file-row.active { background: #EFF6FF; }

.row-left {
  display: flex;
  align-items: center;
  gap: 10px;
  min-width: 0;
}

.folder-icon {
  width: 22px; height: 18px;
  background: var(--folder);
  border-radius: 0 4px 4px 4px;
  flex-shrink: 0;
  position: relative;
}
.folder-icon::before {
  content: '';
  position: absolute;
  top: -4px; left: 0;
  width: 9px; height: 5px;
  background: var(--folder);
  border-radius: 3px 3px 0 0;
}

.txt-icon {
  width: 18px; height: 22px;
  background: #EFF6FF;
  border: 0.5px solid #BFDBFE;
  border-radius: 3px;
  flex-shrink: 0;
  position: relative;
}
.txt-icon::after {
  content: '';
  position: absolute;
  top: 4px; left: 3px; right: 3px;
  height: 1px;
  background: #BFDBFE;
  box-shadow: 0 3px 0 #BFDBFE, 0 6px 0 #BFDBFE, 0 9px 0 #BFDBFE;
}

.row-name {
  font-size: 13px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 6px;
  flex-wrap: wrap;
}
.badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 500;
  letter-spacing: 0.02em;
}
.b-red { background: var(--red-bg); color: var(--red-text); }
.b-amber { background: var(--amber-bg); color: var(--amber-text); }
.b-blue { background: var(--blue-bg); color: var(--blue-text); }
.b-gray { background: var(--gray-bg); color: var(--gray-text); }

.row-date { font-size: 12px; color: var(--text3); text-align: right; }
.row-size { font-size: 12px; color: var(--text3); text-align: right; }

.detail-area {
  margin-top: 16px;
  background: var(--surface);
  border: 0.5px solid var(--border2);
  border-radius: var(--radius-lg);
  overflow: hidden;
  display: none;
  animation: fadeIn 0.15s ease;
}
.detail-area.open { display: block; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}

.detail-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 0.5px solid var(--border);
  background: var(--surface2);
}
.detail-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
}
.detail-close {
  font-size: 11px;
  color: var(--text3);
  cursor: pointer;
  padding: 3px 8px;
  border: 0.5px solid var(--border2);
  border-radius: 5px;
  background: var(--surface);
}
.detail-close:hover { background: var(--surface2); }

.detail-body {
  padding: 14px 16px;
  font-size: 12px;
  line-height: 2;
  color: var(--text2);
  font-family: 'JetBrains Mono', monospace;
  white-space: pre-wrap;
  max-height: 320px;
  overflow-y: auto;
}
.detail-body::-webkit-scrollbar { width: 4px; }
.detail-body::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

.storage-section {
  margin-top: 20px;
  padding: 0 2px;
}
.storage-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.storage-label { font-size: 11px; color: var(--text3); }
.storage-num { font-size: 11px; color: var(--text3); }
.storage-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}
.storage-fill {
  height: 100%;
  width: 23%;
  background: var(--blue);
  border-radius: 2px;
}

.notice {
  margin-top: 28px;
  padding: 12px 16px;
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  font-size: 11px;
  color: var(--text3);
  line-height: 1.8;
  text-align: center;
}
</style>
</head>

let currentKey = null;

function toggle(key, row) {
  const area = document.getElementById('detail-area');
  const prevActive = document.querySelector('.file-row.active');

  if (currentKey === key) {
    area.classList.remove('open');
    row.classList.remove('active');
    currentKey = null;
    return;
  }

  if (prevActive) prevActive.classList.remove('active');
  row.classList.add('active');

  document.getElementById('detail-title').textContent = contents[key].title;
  document.getElementById('detail-body').textContent = contents[key].body;

  area.classList.remove('open');
  void area.offsetWidth;
  area.classList.add('open');

  currentKey = key;

  setTimeout(() => {
    area.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 50);
}

function closeDetail() {
  document.getElementById('detail-area').classList.remove('open');
  const active = document.querySelector('.file-row.active');
  if (active) active.classList.remove('active');
  currentKey = null;
}
